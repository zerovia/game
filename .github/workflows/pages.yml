name: Pages Deploy
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: release
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.publish.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Patch
        env:
          AB1D1C: ${{ secrets.AB1D1C }}
          BDB67F: ${{ secrets.BDB67F }}
        run: |
          python3 -c "
          import os, pathlib, sys
          k1 = os.environ.get('AB1D1C', '')
          k2 = os.environ.get('BDB67F', '')
          idx = pathlib.Path('index.html')
          txt = idx.read_text(encoding='utf-8')
          out = txt.replace('<!-- e7977012fed62245a2b4f9531df87dde3202b50c41bf1c -->', k1) if k1 else txt
          out = out.replace('<!-- 8a27b2daf37600477e4a0cc2ed98ac6911dd7b -->', k2) if k2 else out
          if out == txt and (k1 or k2):
              sys.exit(1)
          if out != txt:
              idx.write_text(out, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: publish
        uses: actions/deploy-pages@v4
