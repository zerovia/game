<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula Run | Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        body { font-family: 'Orbitron', sans-serif; background: #0a0a0c; color: white; margin: 0; }
        #game-container { position: relative; width: 100%; max-width: 800px; height: 400px; margin: 0 auto; overflow: hidden; border: 3px solid #3b82f6; border-radius: 15px; box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
        canvas { background: #000; display: block; width: 100%; height: 100%; }
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .hidden { display: none !important; }
    </style>
<!-- c92fcb3e85a8174ddb71af3663aa14 -->
</head>
<body class="p-6">

    <header class="text-center mb-6">
        <h1 class="text-3xl font-bold text-blue-400 tracking-tighter">NEBULA <span class="text-white">RUN</span></h1>
    </header>

    <div id="game-container">
        <div id="start-screen" class="overlay">
            <h2 class="text-2xl mb-4">SYSTEMS ONLINE</h2>
            <button onclick="startGame()" class="bg-blue-600 hover:bg-blue-500 px-10 py-3 rounded-full font-bold uppercase tracking-widest transition-all active:scale-95">
                Start Engine
            </button>
        </div>

        <div id="game-over" class="overlay hidden">
            <h2 class="text-3xl text-red-500 mb-1">HULL BREACH</h2>
            <p id="final-score" class="text-lg mb-6 text-gray-400">Stars: 0</p>
            <button onclick="startGame()" class="bg-white text-black px-10 py-3 rounded-full font-bold uppercase hover:bg-gray-200">
                Repair & Restart
            </button>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <div class="max-w-[800px] mx-auto mt-6 grid grid-cols-2 gap-4">
        <div class="bg-gray-900/50 p-4 rounded-lg border border-gray-800 text-center">
            <p class="text-gray-500 text-xs uppercase mb-1">Current Stars</p>
            <p id="stat-stars" class="text-2xl font-bold text-yellow-400">0</p>
        </div>
        <div class="bg-gray-900/50 p-4 rounded-lg border border-gray-800 text-center">
            <p class="text-gray-500 text-xs uppercase mb-1">Record</p>
            <p id="stat-high" class="text-2xl font-bold">0</p>
        </div>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const startScreen = document.getElementById('start-screen');
const gameOverScreen = document.getElementById('game-over');

canvas.width = 800;
canvas.height = 400;

let isPlaying = false;
let score = 0;
let gameSpeed = 6;
let obstacles = [];
let highScore = 0;

const player = {
    x: 80, y: 200, w: 35, h: 35,
    dy: 0, gravity: 0.6, jump: -12, grounded: false
};

// Input: Space or Click
window.addEventListener('keydown', e => { if(e.code === 'Space') jump(); });
canvas.addEventListener('mousedown', jump);

function jump() {
    if(!isPlaying) return;
    player.dy = player.jump;
    player.grounded = false;
}

function startGame() {
    isPlaying = true;
    score = 0;
    gameSpeed = 6;
    obstacles = [];
    player.y = 200;
    player.dy = 0;
    startScreen.classList.add('hidden');
    gameOverScreen.classList.add('hidden');
    requestAnimationFrame(update);
}

function spawnObstacle() {
    const h = Math.random() * (100 - 40) + 40;
    obstacles.push({ x: canvas.width, y: canvas.height - h, w: 30, h: h });
}

let timer = 0;
function update() {
    if (!isPlaying) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Player Physics
    player.dy += player.gravity;
    player.y += player.dy;

    if (player.y + player.h > canvas.height) {
        player.y = canvas.height - player.h;
        player.dy = 0;
    }

    // Draw Player (Neon Glow)
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#3b82f6';
    ctx.fillStyle = '#3b82f6';
    ctx.fillRect(player.x, player.y, player.w, player.h);
    ctx.shadowBlur = 0;

    // Obstacle Logic
    timer++;
    if (timer % 90 === 0) spawnObstacle();

    obstacles.forEach((obs, i) => {
        obs.x -= gameSpeed;
        ctx.fillStyle = '#ef4444';
        ctx.fillRect(obs.x, obs.y, obs.w, obs.h);

        // Collision Check
        if (player.x < obs.x + obs.w && player.x + player.w > obs.x &&
            player.y < obs.y + obs.h && player.y + player.h > obs.y) {
            endGame();
        }

        if (obs.x + obs.w < 0) {
            obstacles.splice(i, 1);
            score++;
            document.getElementById('stat-stars').innerText = score;
            if (score % 5 === 0) gameSpeed += 0.2;
        }
    });

    requestAnimationFrame(update);
}

function endGame() {
    isPlaying = false;
    if (score > highScore) {
        highScore = score;
        document.getElementById('stat-high').innerText = highScore;
    }
    document.getElementById('final-score').innerText = `Stars Collected: ${score}`;
    gameOverScreen.classList.remove('hidden');
}
</script>
</body>
</html>
